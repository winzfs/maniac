name: Sync GearDuck News

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

jobs:
  sync-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call news sync endpoint
        env:
          NEWS_SYNC_URL: ${{ secrets.NEWS_SYNC_URL }}
          DEV_TOOLS_SECRET: ${{ secrets.DEV_TOOLS_SECRET }}
        run: |
          if [ -z "$NEWS_SYNC_URL" ]; then
            echo "NEWS_SYNC_URL secret is not set."
            exit 1
          fi
          if [ -z "$DEV_TOOLS_SECRET" ]; then
            echo "DEV_TOOLS_SECRET secret is not set."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(curl -sS -X POST \
            -H "x-dev-tools-secret: ${DEV_TOOLS_SECRET}" \
            -H "accept: application/json" \
            -o "$response_file" \
            -w "%{http_code}" \
            "$NEWS_SYNC_URL")"

          echo "HTTP status: $status_code"
          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi
